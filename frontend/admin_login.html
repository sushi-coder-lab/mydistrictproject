<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Dantewada Education Directory</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .admin-login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f172a;
            color: white;
        }

        .admin-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 1.5rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .admin-card h1 {
            font-size: 1.8rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }

        .admin-card h1 i {
            color: #facc15;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #94a3b8;
        }

        .form-group input {
            width: 100%;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.75rem;
            border-radius: 0.5rem;
            color: white;
        }

        .admin-btn {
            width: 100%;
            background: #facc15;
            color: #0f172a;
            border: none;
            padding: 0.75rem;
            border-radius: 0.5rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 1rem;
        }
    </style>
</head>

<body>
    <div class="admin-login-container">
        <div class="admin-card">
            <h1><i class="fas fa-shield-alt"></i> Admin Panel</h1>
            <form id="admin-login-form">
                <div class="form-group">
                    <label>Admin ID</label>
                    <input type="text" id="admin-user" placeholder="Enter Admin ID" required>
                </div>
                <div class="form-group">
                    <label>Passcode</label>
                    <input type="password" id="admin-pass" placeholder="Enter Code" required>
                </div>
                <button type="submit" class="admin-btn">Access Dashboard</button>
            </form>
            <p id="error-msg" style="color: #ef4444; margin-top: 1rem; display: none;"></p>
        </div>
    </div>

    <script>
        document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('admin-user').value;
            const password = document.getElementById('admin-pass').value;
            const errorMsg = document.getElementById('error-msg');

            try {
                const response = await fetch('https://mydistrictproject-5.onrender.com/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (response.ok) {
                    sessionStorage.setItem('adminAuthenticated', 'true');
                    window.location.href = 'admin.html';
                } else {
                    errorMsg.textContent = 'Invalid Admin ID or Passcode';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'Server connection failed';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>

</html>
