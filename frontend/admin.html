<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Dantewada Edu</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 2rem;
            background: white;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            font-size: 1rem;
        }

        .admin-dashboard {
            display: none;
            max-width: 1200px;
            margin: 4rem auto;
            padding: 2rem;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .error-message {
            color: #e53e3e;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            display: none;
        }
    </style>
</head>

<body>
    <header>
        <div class="top-bar">
            <div class="logo-container">
                <a href="index.html" style="text-decoration: none; display: flex; align-items: center; color: inherit;">
                    <div class="logo-img" style="font-size: 2.5rem;">📚</div>
                    <div class="logo-text">
                        <div class="logo-title">Dantewada Edu</div>
                        <div class="logo-subtitle">Admin Panel</div>
                    </div>
                </a>
            </div>
        </div>
    </header>

    <div id="admin-dashboard" class="admin-dashboard">
        <div class="admin-header">
            <h2>Management Dashboard</h2>
            <div>
                <button class="filter-btn active" onclick="showSection('institutions-form')">Add Institution</button>
                <button class="filter-btn" onclick="showSection('ads-mgmt')" style="margin-left: 0.5rem;">Manage
                    Ads</button>
                <button id="logout-btn" class="filter-btn"
                    style="margin-left: 1rem; background: #fee2e2; color: #ef4444; border-color: #fecaca;">Logout</button>
            </div>
        </div>

        <div id="ads-mgmt" class="mgmt-section" style="display: none; margin-top: 2rem;">
            <div class="card" style="padding: 2rem;">
                <h3>Add New Educational Ad</h3>
                <form id="add-ad-form"
                    style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 1.5rem;">
                    <div class="form-group">
                        <label>Title (Hindi)</label>
                        <input type="text" id="ad-title" placeholder="e.g., निशुल्क कोचिंग शिविर" required>
                    </div>
                    <div class="form-group">
                        <label>Title (English)</label>
                        <input type="text" id="ad-title-en" placeholder="e.g., Free Coaching Camp" required>
                    </div>
                    <div class="form-group" style="grid-column: span 2;">
                        <label>Content (Hindi)</label>
                        <textarea id="ad-content"
                            style="width: 100%; border-radius: 8px; border: 1px solid #e2e8f0; padding: 0.75rem;"
                            required></textarea>
                    </div>
                    <div class="form-group" style="grid-column: span 2;">
                        <label>Content (English)</label>
                        <textarea id="ad-content-en"
                            style="width: 100%; border-radius: 8px; border: 1px solid #e2e8f0; padding: 0.75rem;"
                            required></textarea>
                    </div>
                    <div class="form-group">
                        <label>Image URL</label>
                        <input type="url" id="ad-image" placeholder="URL to ad image">
                    </div>
                    <div class="form-group">
                        <label>Link</label>
                        <input type="url" id="ad-link" placeholder="Link to more info">
                    </div>
                    <button type="submit" class="premium-btn" style="grid-column: span 2; cursor: pointer;">Post
                        Ad</button>
                </form>
            </div>

            <div class="card" style="padding: 2rem; margin-top: 2rem;">
                <h3>Current Active Ads</h3>
                <div id="admin-ads-list" style="margin-top: 1.5rem; display: grid; gap: 1rem;">
                    <!-- Ads will be listed here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // Check authentication
        if (sessionStorage.getItem('adminAuthenticated') !== 'true') {
            window.location.href = 'admin_login.html';
        }

        document.getElementById('logout-btn').addEventListener('click', () => {
            sessionStorage.removeItem('adminAuthenticated');
            window.location.href = 'index.html';
        });

        // Show dashboard if authenticated
        document.getElementById('admin-dashboard').style.display = 'block';

        const API_URL = 'https://mydistrictproject-5.onrender.com/api';

        function showSection(id) {
            document.querySelectorAll('.mgmt-section').forEach(s => s.style.display = 'none');
            const section = document.getElementById(id);
            if (section) section.style.display = 'block';

            if (id === 'ads-mgmt') fetchAdminAds();
        }

        async function fetchAdminAds() {
            const list = document.getElementById('admin-ads-list');
            try {
                const res = await fetch(`${API_URL}/ads`);
                const ads = await res.json();
                list.innerHTML = ads.map(ad => `
                    <div style="display: flex; justify-content: space-between; align-items: center; padding: 1rem; background: #fff; border: 1px solid #e2e8f0; border-radius: 8px;">
                        <div>
                            <strong style="display:block;">${ad.title}</strong>
                            <small style="color: #64748b;">${ad.title_en}</small>
                        </div>
                        <button onclick="deleteAd(${ad.id})" style="color: #ef4444; background: none; border: none; cursor: pointer; font-weight: 600;">Delete</button>
                    </div>
                `).join('');
            } catch (err) {
                console.error(err);
            }
        }

        async function deleteAd(id) {
            if (!confirm('Are you sure you want to delete this ad?')) return;
            try {
                await fetch(`${API_URL}/admin/ads/${id}`, { method: 'DELETE' });
                fetchAdminAds();
            } catch (err) {
                alert('Failed to delete ad');
            }
        }

        document.getElementById('add-ad-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const adData = {
                title: document.getElementById('ad-title').value,
                title_en: document.getElementById('ad-title-en').value,
                content: document.getElementById('ad-content').value,
                content_en: document.getElementById('ad-content-en').value,
                image_url: document.getElementById('ad-image').value,
                link: document.getElementById('ad-link').value
            };

            try {
                const res = await fetch(`${API_URL}/admin/ads`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(adData)
                });
                if (res.ok) {
                    alert('Ad added successfully!');
                    e.target.reset();
                    fetchAdminAds();
                }
            } catch (err) {
                alert('Failed to add ad');
            }
        });
    </script>
</body>

</html>
