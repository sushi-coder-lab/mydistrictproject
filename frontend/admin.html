<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Dantewada Edu</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 2rem;
            background: white;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            font-size: 1rem;
        }

        .admin-dashboard {
            display: none;
            max-width: 1200px;
            margin: 4rem auto;
            padding: 2rem;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .error-message {
            color: #e53e3e;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            display: none;
        }
    </style>
</head>

<body>
    <header>
        <div class="top-bar">
            <div class="logo-container">
                <a href="index.html" style="text-decoration: none; display: flex; align-items: center; color: inherit;">
                    <div class="logo-img" style="font-size: 2.5rem;">📚</div>
                    <div class="logo-text">
                        <div class="logo-title">Dantewada Edu</div>
                        <div class="logo-subtitle">Admin Panel</div>
                    </div>
                </a>
            </div>
        </div>
    </header>

    <div id="admin-dashboard" class="admin-dashboard">
        <div class="admin-header">
            <h2>Management Dashboard</h2>
            <div>
                <button class="filter-btn active" onclick="showSection('institutions-mgmt', event)">Add
                    Institution</button>
                <button class="filter-btn" onclick="showSection('ads-mgmt', event)" style="margin-left: 0.5rem;">Manage
                    Ads</button>
                <button id="logout-btn" class="filter-btn"
                    style="margin-left: 1rem; background: #fee2e2; color: #ef4444; border-color: #fecaca;">Logout</button>
            </div>
        </div>

        <div id="institutions-mgmt" class="mgmt-section" style="display: none; margin-top: 2rem;">
            <div class="card" style="padding: 2rem;">
                <h3 id="inst-form-title">Add New Institution</h3>
                <form id="institution-form"
                    style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 1.5rem;">
                    <input type="hidden" id="inst-id">
                    <div class="form-group">
                        <label>Name (Hindi)</label>
                        <input type="text" id="inst-name" required>
                    </div>
                    <div class="form-group">
                        <label>Name (English)</label>
                        <input type="text" id="inst-name-en" required>
                    </div>
                    <div class="form-group">
                        <label>Type</label>
                        <select id="inst-type"
                            style="width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 0.5rem;">
                            <option value="School">School</option>
                            <option value="College">College</option>
                            <option value="ITI">ITI</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Type (English)</label>
                        <input type="text" id="inst-type-en" required>
                    </div>
                    <div class="form-group">
                        <label>Location (Hindi)</label>
                        <input type="text" id="inst-location" required>
                    </div>
                    <div class="form-group">
                        <label>Location (English)</label>
                        <input type="text" id="inst-location-en" required>
                    </div>
                    <div class="form-group">
                        <label>Streams (Hindi)</label>
                        <input type="text" id="inst-streams" placeholder="e.g. कला, विज्ञान, वाणिज्य">
                    </div>
                    <div class="form-group">
                        <label>Streams (English)</label>
                        <input type="text" id="inst-streams-en" placeholder="e.g. Arts, Science, Commerce">
                    </div>
                    <div class="form-group">
                        <label>Subjects (Hindi)</label>
                        <input type="text" id="inst-subjects">
                    </div>
                    <div class="form-group">
                        <label>Subjects (English)</label>
                        <input type="text" id="inst-subjects-en">
                    </div>
                    <div class="form-group" style="grid-column: span 2;">
                        <label>Facilities (Hindi)</label>
                        <textarea id="inst-facilities"
                            style="width: 100%; border-radius: 8px; border: 1px solid #e2e8f0; padding: 0.75rem;"></textarea>
                    </div>
                    <div class="form-group" style="grid-column: span 2;">
                        <label>Facilities (English)</label>
                        <textarea id="inst-facilities-en"
                            style="width: 100%; border-radius: 8px; border: 1px solid #e2e8f0; padding: 0.75rem;"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Contact (Hindi)</label>
                        <input type="text" id="inst-contact">
                    </div>
                    <div class="form-group">
                        <label>Contact (English)</label>
                        <input type="text" id="inst-contact-en">
                    </div>
                    <div class="form-group">
                        <label>Admission Process (Hindi)</label>
                        <input type="text" id="inst-admission">
                    </div>
                    <div class="form-group">
                        <label>Admission Process (English)</label>
                        <input type="text" id="inst-admission-en">
                    </div>
                    <div class="form-group">
                        <label>Main Image URL</label>
                        <input type="url" id="inst-image" placeholder="URL to main image">
                    </div>
                    <div class="form-group">
                        <label>Map Location URL</label>
                        <input type="url" id="inst-map" placeholder="Google Maps URL">
                    </div>

                    <div id="multi-images-section"
                        style="grid-column: span 2; display: none; margin-top: 1rem; border-top: 1px solid #eee; padding-top: 1rem;">
                        <h4>Manage Institution Gallery</h4>
                        <div id="gallery-list" style="display: flex; gap: 1rem; flex-wrap: wrap; margin: 1rem 0;"></div>
                        <div style="display: flex; gap: 1rem;">
                            <input type="url" id="new-gallery-image" placeholder="New Image URL" style="flex: 1;">
                            <button type="button" onclick="addGalleryImage()" class="premium-btn"
                                style="width: auto; padding: 0.5rem 1rem;">Add Image</button>
                        </div>
                    </div>

                    <div style="grid-column: span 2; display: flex; gap: 1rem;">
                        <button type="submit" id="submit-inst-btn" class="premium-btn"
                            style="flex: 1; cursor: pointer;">Save Institution</button>
                        <button type="button" onclick="resetInstForm()" class="filter-btn"
                            style="flex: 1; cursor: pointer;">Cancel</button>
                    </div>
                </form>
            </div>

            <div class="card" style="padding: 2rem; margin-top: 2rem;">
                <h3>Institutions List</h3>
                <div id="admin-inst-list" style="margin-top: 1.5rem; display: grid; gap: 1rem;">
                    <!-- Institutions will be listed here -->
                </div>
            </div>
        </div>

        <div id="ads-mgmt" class="mgmt-section" style="display: none; margin-top: 2rem;">
            <div class="card" style="padding: 2rem;">
                <h3>Add New Educational Ad</h3>
                <form id="add-ad-form"
                    style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 1.5rem;">
                    <div class="form-group">
                        <label>Title (Hindi)</label>
                        <input type="text" id="ad-title" placeholder="e.g., निशुल्क कोचिंग शिविर" required>
                    </div>
                    <div class="form-group">
                        <label>Title (English)</label>
                        <input type="text" id="ad-title-en" placeholder="e.g., Free Coaching Camp" required>
                    </div>
                    <div class="form-group" style="grid-column: span 2;">
                        <label>Content (Hindi)</label>
                        <textarea id="ad-content"
                            style="width: 100%; border-radius: 8px; border: 1px solid #e2e8f0; padding: 0.75rem;"
                            required></textarea>
                    </div>
                    <div class="form-group" style="grid-column: span 2;">
                        <label>Content (English)</label>
                        <textarea id="ad-content-en"
                            style="width: 100%; border-radius: 8px; border: 1px solid #e2e8f0; padding: 0.75rem;"
                            required></textarea>
                    </div>
                    <div class="form-group">
                        <label>Image URL</label>
                        <input type="url" id="ad-image" placeholder="URL to ad image">
                    </div>
                    <div class="form-group">
                        <label>Link</label>
                        <input type="url" id="ad-link" placeholder="Link to more info">
                    </div>
                    <button type="submit" class="premium-btn" style="grid-column: span 2; cursor: pointer;">Post
                        Ad</button>
                </form>
            </div>

            <div class="card" style="padding: 2rem; margin-top: 2rem;">
                <h3>Current Active Ads</h3>
                <div id="admin-ads-list" style="margin-top: 1.5rem; display: grid; gap: 1rem;">
                    <!-- Ads will be listed here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // Check authentication
        if (sessionStorage.getItem('adminAuthenticated') !== 'true') {
            window.location.href = 'admin_login.html';
        }

        document.getElementById('logout-btn').addEventListener('click', () => {
            sessionStorage.removeItem('adminAuthenticated');
            window.location.href = 'index.html';
        });

        // Show dashboard if authenticated
        document.getElementById('admin-dashboard').style.display = 'block';

        const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.protocol === 'file:'
            ? 'http://localhost:5000/api'
            : 'https://mydistrictproject-5.onrender.com/api';

        function showSection(id, event) {
            document.querySelectorAll('.mgmt-section').forEach(s => s.style.display = 'none');
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));

            const section = document.getElementById(id);
            if (section) section.style.display = 'block';

            // Set active button
            if (event && event.target) {
                event.target.classList.add('active');
            }

            if (id === 'ads-mgmt') fetchAdminAds();
            if (id === 'institutions-mgmt') fetchAdminInstitutions();
        }

        // --- Institutions Management ---

        async function fetchAdminInstitutions() {
            const list = document.getElementById('admin-inst-list');
            try {
                const res = await fetch(`${API_URL}/institutions`);
                const insts = await res.json();
                list.innerHTML = insts.map(inst => `
                    <div style="display: flex; justify-content: space-between; align-items: center; padding: 1rem; background: #fff; border: 1px solid #e2e8f0; border-radius: 8px;">
                        <div>
                            <strong style="display:block;">${inst.name}</strong>
                            <small style="color: #64748b;">${inst.type} | ${inst.location}</small>
                        </div>
                        <div style="display: flex; gap: 1rem;">
                            <button onclick="editInstitution(${inst.id})" style="color: #6366f1; background: none; border: none; cursor: pointer; font-weight: 600;">Edit</button>
                            <button onclick="deleteInstitution(${inst.id})" style="color: #ef4444; background: none; border: none; cursor: pointer; font-weight: 600;">Delete</button>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error(err);
            }
        }

        async function editInstitution(id) {
            try {
                const res = await fetch(`${API_URL}/institutions/${id}`);
                const inst = await res.json();

                document.getElementById('inst-id').value = inst.id;
                document.getElementById('inst-name').value = inst.name;
                document.getElementById('inst-name-en').value = inst.name_en;
                document.getElementById('inst-type').value = inst.type;
                document.getElementById('inst-type-en').value = inst.type_en;
                document.getElementById('inst-location').value = inst.location;
                document.getElementById('inst-location-en').value = inst.location_en;
                document.getElementById('inst-streams').value = inst.streams || '';
                document.getElementById('inst-streams-en').value = inst.streams_en || '';
                document.getElementById('inst-subjects').value = inst.subjects || '';
                document.getElementById('inst-subjects-en').value = inst.subjects_en || '';
                document.getElementById('inst-facilities').value = inst.facilities || '';
                document.getElementById('inst-facilities-en').value = inst.facilities_en || '';
                document.getElementById('inst-contact').value = inst.contact_details || '';
                document.getElementById('inst-contact-en').value = inst.contact_details_en || '';
                document.getElementById('inst-admission').value = inst.admission_process || '';
                document.getElementById('inst-admission-en').value = inst.admission_process_en || '';
                document.getElementById('inst-image').value = inst.image_url || '';
                document.getElementById('inst-map').value = inst.map_location || '';

                document.getElementById('inst-form-title').innerText = 'Edit Institution';
                document.getElementById('multi-images-section').style.display = 'block';
                fetchGallery(id);

                window.scrollTo({ top: 0, behavior: 'smooth' });
            } catch (err) {
                alert('Failed to fetch institution details');
            }
        }

        function resetInstForm() {
            document.getElementById('institution-form').reset();
            document.getElementById('inst-id').value = '';
            document.getElementById('inst-form-title').innerText = 'Add New Institution';
            document.getElementById('multi-images-section').style.display = 'none';
            document.getElementById('gallery-list').innerHTML = ''; // Clear gallery images
        }

        document.getElementById('institution-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('inst-id').value;
            const data = {
                name: document.getElementById('inst-name').value,
                name_en: document.getElementById('inst-name-en').value,
                type: document.getElementById('inst-type').value,
                type_en: document.getElementById('inst-type-en').value,
                location: document.getElementById('inst-location').value,
                location_en: document.getElementById('inst-location-en').value,
                streams: document.getElementById('inst-streams').value,
                streams_en: document.getElementById('inst-streams-en').value,
                subjects: document.getElementById('inst-subjects').value,
                subjects_en: document.getElementById('inst-subjects-en').value,
                facilities: document.getElementById('inst-facilities').value,
                facilities_en: document.getElementById('inst-facilities-en').value,
                contact_details: document.getElementById('inst-contact').value,
                contact_details_en: document.getElementById('inst-contact-en').value,
                admission_process: document.getElementById('inst-admission').value,
                admission_process_en: document.getElementById('inst-admission-en').value,
                image_url: document.getElementById('inst-image').value,
                map_location: document.getElementById('inst-map').value
            };

            try {
                const method = id ? 'PUT' : 'POST';
                const url = id ? `${API_URL}/admin/institutions/${id}` : `${API_URL}/admin/institutions`;

                const res = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    alert(id ? 'Institution updated!' : 'Institution added!');
                    resetInstForm();
                    fetchAdminInstitutions();
                } else {
                    const errorData = await res.json();
                    alert(`Operation failed: ${errorData.message || res.statusText}`);
                }
            } catch (err) {
                alert('Operation failed');
                console.error(err);
            }
        });

        async function deleteInstitution(id) {
            if (!confirm('Delete this institution?')) return;
            try {
                const res = await fetch(`${API_URL}/admin/institutions/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    fetchAdminInstitutions();
                } else {
                    const errorData = await res.json();
                    alert(`Delete failed: ${errorData.message || res.statusText}`);
                }
            } catch (err) {
                alert('Delete failed');
                console.error(err);
            }
        }

        // --- Gallery Management ---

        async function fetchGallery(instId) {
            const list = document.getElementById('gallery-list');
            try {
                const res = await fetch(`${API_URL}/institutions/${instId}/images`);
                const images = await res.json();
                list.innerHTML = images.map(img => `
                    <div style="position: relative;">
                        <img src="${img.image_url}" style="width: 100px; height: 100px; object-fit: cover; border-radius: 8px;">
                        <button onclick="deleteGalleryImage(${img.id}, ${instId})" style="position: absolute; top: -5px; right: -5px; background: red; color: white; border: none; border-radius: 50%; width: 20px; height: 20px; cursor: pointer; font-size: 12px;">×</button>
                    </div>
                `).join('');
            } catch (err) {
                console.error(err);
            }
        }

        async function addGalleryImage() {
            const instId = document.getElementById('inst-id').value;
            const urlInput = document.getElementById('new-gallery-image');
            const image_url = urlInput.value;
            if (!image_url) {
                alert('Please enter an image URL.');
                return;
            }
            if (!instId) {
                alert('Please save the institution first before adding gallery images.');
                return;
            }

            try {
                const res = await fetch(`${API_URL}/admin/institutions/${instId}/images`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image_url })
                });
                if (res.ok) {
                    urlInput.value = '';
                    fetchGallery(instId);
                } else {
                    const errorData = await res.json();
                    alert(`Failed to add image: ${errorData.message || res.statusText}`);
                }
            } catch (err) {
                alert('Failed to add image');
                console.error(err);
            }
        }

        async function deleteGalleryImage(imageId, instId) {
            if (!confirm('Delete this gallery image?')) return;
            try {
                const res = await fetch(`${API_URL}/admin/institutions/images/${imageId}`, { method: 'DELETE' });
                if (res.ok) {
                    fetchGallery(instId);
                } else {
                    const errorData = await res.json();
                    alert(`Delete failed: ${errorData.message || res.statusText}`);
                }
            } catch (err) {
                alert('Delete failed');
                console.error(err);
            }
        }

        // --- Ads Management ---

        async function fetchAdminAds() {
            const list = document.getElementById('admin-ads-list');
            try {
                const res = await fetch(`${API_URL}/ads`);
                const ads = await res.json();
                list.innerHTML = ads.map(ad => `
                    <div style="display: flex; justify-content: space-between; align-items: center; padding: 1rem; background: #fff; border: 1px solid #e2e8f0; border-radius: 8px;">
                        <div>
                            <strong style="display:block;">${ad.title}</strong>
                            <small style="color: #64748b;">${ad.title_en}</small>
                        </div>
                        <button onclick="deleteAd(${ad.id})" style="color: #ef4444; background: none; border: none; cursor: pointer; font-weight: 600;">Delete</button>
                    </div>
                `).join('');
            } catch (err) {
                console.error(err);
            }
        }

        async function deleteAd(id) {
            if (!confirm('Are you sure you want to delete this ad?')) return;
            try {
                const res = await fetch(`${API_URL}/admin/ads/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    fetchAdminAds();
                } else {
                    const errorData = await res.json();
                    alert(`Failed to delete ad: ${errorData.message || res.statusText}`);
                }
            } catch (err) {
                alert('Failed to delete ad');
                console.error(err);
            }
        }

        document.getElementById('add-ad-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const adData = {
                title: document.getElementById('ad-title').value,
                title_en: document.getElementById('ad-title-en').value,
                content: document.getElementById('ad-content').value,
                content_en: document.getElementById('ad-content-en').value,
                image_url: document.getElementById('ad-image').value,
                link: document.getElementById('ad-link').value
            };

            try {
                const res = await fetch(`${API_URL}/admin/ads`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(adData)
                });
                if (res.ok) {
                    alert('Ad added successfully!');
                    e.target.reset();
                    fetchAdminAds();
                } else {
                    const errorData = await res.json();
                    alert(`Failed to add ad: ${errorData.message || res.statusText}`);
                }
            } catch (err) {
                alert('Failed to add ad');
                console.error(err);
            }
        });

        // Initial load: show institutions section by default
        document.getElementById('institutions-mgmt').style.display = 'block';
        fetchAdminInstitutions();
    </script>
</body>

</html>
